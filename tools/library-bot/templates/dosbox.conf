[sdl]
fullscreen=false
fulldouble=true

[dosbox]
machine=svga_s3
memsize=16

[cpu]
core=auto
cycles=12000
cycleup=500
cycledown=500

[mixer]
nosound=false
rate=44100
blocksize=2048
prebuffer=40

[autoexec]
@echo off
mount c .
c:
cd GAME
if exist START.BAT call START.BAT
for %%f in (*.exe) do set GAME_EXE=%%f
if defined GAME_EXE %GAME_EXE%
cls
echo Could not auto-detect launcher. Use DIR then run game executable manually.
